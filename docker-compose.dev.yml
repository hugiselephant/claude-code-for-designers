services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: academy
      POSTGRES_PASSWORD: academy
      POSTGRES_DB: academy
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academy -d academy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
